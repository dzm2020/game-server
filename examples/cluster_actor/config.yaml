base:
  logger:
    path: ./logs/cluster-actor-example.log
    level: info
    printConsole: true
    maxSize: 100
    maxBackups: 3
    maxAge: 7
    compress: false
    localTime: true
  consul:
    address: 127.0.0.1:8500
    scheme: http
  nats:
    url: nats://127.0.0.1:4222
  gateway:
    enable: false
    address: 127.0.0.1
    port: 19090
    actorName: gateway-router
    routeNodeID: cluster-actor-example-node
    routeActorName: echo
    requestTimeoutMs: 2000
  self:
    id: cluster-actor-example-node
    name: cluster-actor-example
    address: 127.0.0.1
    port: 19100
